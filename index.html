<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Script Hub</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#050b1f;
    color:white;
}

header{
    text-align:center;
    padding:40px 20px;
}

h1{
    font-size:50px;
    color:#4da6ff;
}

.subtitle{
    color:#c0d8ff;
}

.card{
    max-width:450px;
    margin:20px auto;
    background:#10182d;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(77,166,255,.25);
}

.banner{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:20px;
}

.button{
    display:block;
    text-align:center;
    background:#4da6ff;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<header>
    <h1>Blue Script Hub</h1>
    <p class="subtitle">Welcome to my website</p>
</header>

<div class="card">
    <img class="banner" src="https://picsum.photos/800/400" alt="">
    <div class="content">
        <h2>Featured Project</h2>
        <p>Lagyan mo ng description dito.</p>
        <a class="button" href="#">Open</a>
    </div>
</div>

</body>
</html>
